on:
  workflow_call:
    inputs:
      app:
        required: true
        type: string
      java-version:
        required: false
        type: string
        default: "19"
jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        language: ["kotlin"]
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Set up Java
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          distribution: "temurin"
          java-version: ${{inputs.java-version}}
      - name: Initialize CodeQL
        uses: github/codeql-action/init@95e58e9a2cdfd71adc6e0353d5c52f41a045d225 # v4
        with:
          languages: ${{ matrix.language }}
      - name: Build bootJar artifacts
        run: |
          ./gradlew bootJar -x test
        env:
          ORG_GRADLE_PROJECT_githubUser: x-access-token
          ORG_GRADLE_PROJECT_githubPassword: ${{ secrets.GITHUB_TOKEN }}
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@95e58e9a2cdfd71adc6e0353d5c52f41a045d225 # v4
        with:
          category: "/language:${{matrix.language}}"

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: navikt/teamesyfo-github-actions-workflows/actions/gradle-cached@main
        with:
          java-version: ${{inputs.java-version}}
      - run: ./gradlew test
        env:
          ORG_GRADLE_PROJECT_githubUser: x-access-token
          ORG_GRADLE_PROJECT_githubPassword: ${{ secrets.GITHUB_TOKEN }}

  build:
    name: Build
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: write
      id-token: write
    outputs:
      image: ${{ steps.build-and-publish.outputs.image }}
    steps:
      - uses: navikt/teamesyfo-github-actions-workflows/actions/boot-jar-to-docker@main
        id: build-and-publish
        with:
          app: ${{ inputs.app }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          java-version: ${{inputs.java-version}}

  merge-gate:
    name: Merge gate
    needs: [analyze, test, build]
    runs-on: ubuntu-latest
    permissions: {}
    if: always()
    steps:
      - name: Check required jobs
        shell: bash
        run: |
          set -euo pipefail

          # Single required check for branch protection.
          results=(
            "analyze=${{ needs.analyze.result }}"
            "test=${{ needs.test.result }}"
            "build=${{ needs.build.result }}"
          )
          printf '%s\n' "${results[@]}"

          for r in "${results[@]}"; do
            status="${r#*=}"
            case "$status" in
              success) ;;
              cancelled)
                echo "::error::Required job was cancelled: $r"
                exit 1
                ;;
              *)
                echo "::error::Required job failed: $r"
                exit 1
                ;;
            esac
          done

  deploy-dev:
    if: ${{ github.actor != 'dependabot[bot]' && github.event.pull_request.draft == false }}
    name: Deploy to dev
    runs-on: ubuntu-latest
    needs: [test, build]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: nais/deploy/actions/deploy@fa754451577294aae42872a69b888b3470478ec1 # v2
        env:
          CLUSTER: dev-gcp
          RESOURCE: nais/nais-dev.yaml
          VAR: image=${{ needs.build.outputs.image }}

  deploy-prod:
    if: github.ref_name == 'main'
    name: Deploy to prod
    runs-on: ubuntu-latest
    needs: [test, build]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: nais/deploy/actions/deploy@fa754451577294aae42872a69b888b3470478ec1 # v2
        env:
          CLUSTER: prod-gcp
          RESOURCE: nais/nais-prod.yaml
          VAR: image=${{ needs.build.outputs.image }}
